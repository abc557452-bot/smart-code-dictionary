<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Smart Code Dictionary</h1>

<div class="search-box">

<input 
type="text"
id="searchInput"
placeholder="ابحث عن مصطلح..."
onkeyup="suggestWords()"
>

<button onclick="searchTerm()">بحث</button>

<button onclick="clearSearch()">مسح</button>

</div>

<div id="suggestions"></div>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
