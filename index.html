<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>

<style>
/* التنسيق القديم محفوظ */
.term pre{
  background:#f4f4f4;
  border:1px solid #ccc;
  padding:10px;
  overflow-x:auto;
  white-space:pre-wrap;
  font-family:monospace;
}

.term button, .search-box button, .filter-box button{
  margin:3px 5px;
  padding:5px 10px;
  cursor:pointer;
}

.search-box{
  margin-top:20px;
}

.filter-box{
  margin-top:10px;
}

#termCounter{
  margin-top:10px;
  font-weight:bold;
  color:#444;
}

/* صندوق تجربة الكود */
#codeTester{
  border:1px solid #ccc;
  padding:10px;
  margin-top:20px;
}

#codeTester textarea{
  width:100%;
  height:150px;
  margin-top:10px;
  font-family:monospace;
}

#codeTester pre{
  background:#f5f5f5;
  padding:10px;
  margin-top:10px;
  white-space:pre-wrap;
  border:1px solid #ccc;
}
</style>


</head>
<body>

<div class="container">

  <h1>Smart Code Dictionary</h1>

  <!-- صندوق البحث -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مصطلح..." onkeyup="searchTerm();suggestWords();">
    <button onclick="searchTerm()">بحث</button>
    <button onclick="clearSearch()">مسح</button>
    <button onclick="showAllTerms()">عرض جميع المصطلحات</button>
  </div>

  <!-- اقتراح الكلمات -->
  <div id="suggestions"></div>

  <!-- عداد المصطلحات -->
  <div id="termCounter"></div>

  <!-- عرض النتائج -->
  <div id="results"></div>

  <!-- فلترة المجالات -->
  <div class="filter-box">
    <button onclick="filterField('Python')">Python</button>
    <button onclick="filterField('JavaScript')">JavaScript</button>
    <button onclick="filterField('Cyber Security')">Cyber Security</button>
    <button onclick="filterField('Navigation')">Navigation</button>
    <button onclick="startQuiz()">اختبار</button>
    <button onclick="showAllTerms()">عرض الكل</button>
  </div>

</div>

<!-- ملفات القاموس والكود -->
<script src="data.js"></script>
<script src="script.js"></script>
<script>
document.getElementById("searchInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    searchTerm();
  }
});
</script>

</body>
</html>
