<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>

<style>
/* التنسيق القديم محفوظ */
.term pre{
    background:#f4f4f4;
    border:1px solid #ccc;
    padding:10px;
    overflow-x:auto;
    white-space:pre-wrap;
    font-family:monospace;
}

.term button{
    margin-top:5px;
    padding:5px 10px;
    cursor:pointer;
}

.search-box button{
    margin-left:5px;
    padding:5px 10px;
    cursor:pointer;
}

.filter-box{
    margin-top:10px;
}

.filter-box button{
    margin:3px;
    padding:5px 10px;
    cursor:pointer;
}

#termCounter{
    margin-top:10px;
    font-weight:bold;
    color:#444;
}

#suggestions{
    background:white;
    border:1px solid #ccc;
    max-height:200px;
    overflow-y:auto;
    position:absolute;
    width:300px;
    z-index:1000;
}

.suggestion-item{
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.suggestion-item:hover{
    background:#f2f2f2;
}
</style>

</head>

<body>

<div class="container">

<h1>Smart Code Dictionary</h1>

<!-- صندوق البحث -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن مصطلح...">
<div id="suggestions"></div>
<button id="searchBtn">بحث</button>
<button id="clearBtn">مسح</button>
<button id="showAllBtn">عرض جميع المصطلحات</button>
</div>

<!-- فلترة المجالات -->
<div class="filter-box">
<button data-field="Python">Python</button>
<button data-field="JavaScript">JavaScript</button>
<button data-field="Cyber Security">Cyber Security</button>
<button data-field="Navigation">Navigation</button>
<button id="filterAll">عرض الكل</button>
</div>

<!-- عداد المصطلحات -->
<div id="termCounter"></div>

<!-- مكان عرض المصطلحات -->
<div id="dictionary-list"></div>

</div>

<!-- ربط السكريبت الجديد -->
<script src="script.js"></script>

</body>
</html>
