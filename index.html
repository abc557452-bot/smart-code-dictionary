<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>
<style>
/* ======= تنسيق المصطلحات والكود ======= */
.term pre {
    background:#f4f4f4;
    border:1px solid #ccc;
    padding:10px;
    overflow-x:auto;
    white-space:pre-wrap;
    font-family:monospace;
}
.term button, .search-box button, .filter-box button {
    margin:3px 5px;
    padding:5px 10px;
    cursor:pointer;
}
.search-box{ margin-top:20px; }
.filter-box{ margin-top:10px; }
#termCounter{ margin-top:10px; font-weight:bold; color:#444; }
#codeTester{
    border:1px solid #ccc;
    padding:10px;
    margin-top:20px;
}
#codeTester textarea{ width:100%; height:150px; margin-top:10px; font-family:monospace; }
#codeTester pre{
    background:#f5f5f5;
    padding:10px;
    margin-top:10px;
    white-space:pre-wrap;
    border:1px solid #ccc;
}
.active{ background-color:#2c5364; color:white; }
</style>
</head>
<body>
<div class="container">
<h1>Smart Code Dictionary</h1>

<!-- صندوق البحث -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مصطلح..." onkeyup="searchTerm();">
    <button onclick="searchTerm()">بحث</button>
    <button onclick="clearSearch()">مسح</button>
    <button onclick="showAllTerms()">عرض جميع المصطلحات</button>
</div>

<!-- اقتراح الكلمات -->
<div id="suggestions"></div>

<!-- عداد المصطلحات -->
<div id="termCounter"></div>

<!-- فلترة المجالات -->
<div class="filter-box">
    <button onclick="setActive(this); showAllTerms()">الكل</button>
    <button onclick="setActive(this); filterField('Artificial Intelligence')">AI</button>
    <button onclick="setActive(this); filterField('Navigation')">Navigation</button>
    <button onclick="setActive(this); filterField('Cyber Security')">Cyber</button>
</div>

<!-- عرض المصطلحات -->
<div id="termsList"></div>

<!-- تجربة الكود -->
<div id="codeTester">
<h3>تجربة الكود</h3>
<label>اختر اللغة:</label>
<select id="codeLang">
  <option value="js">JavaScript</option>
  <option value="py">Python</option>
</select>
<textarea id="testCode" placeholder="ضع كودك هنا"></textarea>
<button id="runCode">تشغيل الكود</button>
<button id="clearCode">مسح الكود</button>
<button id="copyCode">نسخ الكود</button>
<pre id="output"></pre>
</div>

</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<script>
// ======== بيانات القاموس ========
const dictionary = [
    { code:"NAV-001", title:"Satellite Navigation", field:"Navigation", definition:"نظام الملاحة عبر الأقمار الصناعية", example_code:"# مثال Python\nprint('GPS')"},
    { code:"AI-001", title:"Machine Learning", field:"Artificial Intelligence", definition:"تعلم الآلة لتدريب النماذج", example_code:"# مثال Python\nmodel.fit(X, y)"},
    { code:"CY-001", title:"Malware", field:"Cyber Security", definition:"برمجيات خبيثة تهدد النظام", example_code:"// JavaScript\nconsole.log('Malware')"},
    // أضف المزيد هنا حسب الحاجة
];

// ======== عرض جميع المصطلحات ========
function showAllTerms(){
    const displayDiv = document.getElementById("termsList");
    displayDiv.innerHTML = "";
    dictionary.forEach(term=>{
        const div = document.createElement("div");
        div.className = "term";
        div.innerHTML = `<h3>${term.title} (${term.code})</h3>
                         <p><strong>المجال:</strong> ${term.field}</p>
                         <p>${term.definition}</p>
                         <pre>${term.example_code || ""}</pre>`;
        displayDiv.appendChild(div);
    });
    document.getElementById("termCounter").innerText = "عدد المصطلحات: " + dictionary.length;
}

// ======== فلترة المجالات ========
function filterField(fieldName){
    const displayDiv = document.getElementById("termsList");
    displayDiv.innerHTML = "";
    const filtered = dictionary.filter(t => t.field === fieldName);
    filtered.forEach(term=>{
        const div = document.createElement("div");
        div.className = "term";
        div.innerHTML = `<h3>${term.title} (${term.code})</h3>
                         <p><strong>المجال:</strong> ${term.field}</p>
                         <p>${term.definition}</p>
                         <pre>${term.example_code || ""}</pre>`;
        displayDiv.appendChild(div);
    });
    document.getElementById("termCounter").innerText = "عدد المصطلحات: " + filtered.length;
}

// ======== تفعيل زر محدد ========
function setActive(button){
    document.querySelectorAll(".filter-box button").forEach(btn=>btn.classList.remove("active"));
    button.classList.add("active");
}

// ======== البحث ========
function searchTerm(){
    const input = document.getElementById("searchInput").value.toLowerCase();
    const displayDiv = document.getElementById("termsList");
    displayDiv.innerHTML = "";
    const filtered = dictionary.filter(t => t.title.toLowerCase().includes(input) || t.code.toLowerCase().includes(input));
    filtered.forEach(term=>{
        const div = document.createElement("div");
        div.className = "term";
        div.innerHTML = `<h3>${term.title} (${term.code})</h3>
                         <p><strong>المجال:</strong> ${term.field}</p>
                         <p>${term.definition}</p>
                         <pre>${term.example_code || ""}</pre>`;
        displayDiv.appendChild(div);
    });
    document.getElementById("termCounter").innerText = "عدد المصطلحات: " + filtered.length;
}

// ======== مسح البحث ========
function clearSearch(){
    document.getElementById("searchInput").value = "";
    showAllTerms();
}

// ======== تجربة الكود ========
let pyodide = null;
async function loadPyodideAndPackages(){
    document.getElementById("output").innerText = "جاري تحميل Python...";
    pyodide = await loadPyodide();
    document.getElementById("output").innerText = "Python جاهز للتجربة";
}
loadPyodideAndPackages();

document.getElementById("runCode").addEventListener("click", async ()=>{
    const code = document.getElementById("testCode").value;
    const lang = document.getElementById("codeLang").value;
    const output = document.getElementById("output");
    output.innerText = "";

    if(lang==="js"){
        try{
            const result = eval(code);
            output.innerText = (result !== undefined) ? result : "تم التنفيذ بنجاح";
        }catch(err){ output.innerText = "خطأ: " + err.message; }
    }

    if(lang==="py"){
        if(!pyodide){ output.innerText="Python مازال يحمل..."; return; }
        try{
            pyodide.runPython(`import sys\nfrom io import StringIO\nsys.stdout=StringIO()`);
            await pyodide.runPythonAsync(code);
            const result = pyodide.runPython("sys.stdout.getvalue()");
            output.innerText = result.trim() === "" ? "تم التنفيذ بدون مخرجات" : result;
        }catch(err){ output.innerText = "خطأ: "+err; }
    }
});

document.getElementById("clearCode").addEventListener("click", ()=>{
    document.getElementById("testCode").value="";
    document.getElementById("output").innerText="";
});

document.getElementById("copyCode").addEventListener("click", ()=>{
    const code = document.getElementById("testCode");
    code.select();
    document.execCommand("copy");
    alert("تم نسخ الكود");
});

// ======== تشغيل عرض كل المصطلحات عند تحميل الصفحة ========
window.onload = showAllTerms;
</script>
</body>
</html>
