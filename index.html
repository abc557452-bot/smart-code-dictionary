<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

  <h1>Smart Code Dictionary</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث..." onkeyup="searchTerm();suggestWords();">
    <button onclick="searchTerm()">بحث</button>
    <button onclick="clearSearch()">مسح</button>
    <button onclick="showAllTerms()">عرض جميع المصطلحات</button>
  </div>

  <div id="suggestions"></div>

  <div id="termCounter"></div>

  <!-- الفلترة -->
  <div class="filter-box">
    <button onclick="showAllTerms()">الكل</button>
    <button onclick="filterField('Artificial Intelligence')">AI</button>
    <button onclick="filterField('Navigation')">Navigation</button>
    <button onclick="filterField('Cyber Security')">Cyber</button>
  </div>

  <!-- النتائج -->
  <div id="results"></div>

  <!-- تجربة الكود -->
  <div id="codeTester">
    <h3>تجربة الكود</h3>
    <select id="codeLang">
      <option value="js">JavaScript</option>
      <option value="py">Python</option>
    </select>
    <textarea id="testCode"></textarea>
    <button id="runCode">تشغيل</button>
    <pre id="output"></pre>
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
