<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>
<style>
.term pre {
    background-color: #f4f4f4;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-x: auto;
    white-space: pre-wrap;
    font-family: monospace;
}
.term button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
.search-box button {
    margin-left: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>Smart Code Dictionary</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن مصطلح..." onkeyup="searchTerm(); suggestWords();">
<button onclick="searchTerm()">بحث</button>
<button onclick="clearSearch()">مسح</button>
<button onclick="showAllTerms()">عرض جميع المصطلحات</button>
</div>

<div id="suggestions"></div>
<div id="results"></div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
