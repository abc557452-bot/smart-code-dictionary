<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>

<style>
/* تنسيق القاموس القديم */
.term pre {
    background-color: #f4f4f4;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-x: auto;
    white-space: pre-wrap;
    font-family: monospace;
}
.term button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
.search-box button {
    margin-left: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

/* صندوق تجربة الكود */
#codeTester {
    border: 1px solid #ccc;
    padding: 10px;
    margin-top: 20px;
}
#codeTester textarea {
    width: 100%;
    height: 150px;
    margin-top: 10px;
    font-family: monospace;
}
#codeTester pre {
    background: #f5f5f5;
    padding: 10px;
    margin-top: 10px;
    white-space: pre-wrap;
    border: 1px solid #ccc;
}
#codeTester button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Smart Code Dictionary</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن مصطلح..." onkeyup="searchTerm(); suggestWords();">
<button onclick="searchTerm()">بحث</button>
<button onclick="clearSearch()">مسح</button>
<button onclick="showAllTerms()">عرض جميع المصطلحات</button>
</div>

<div id="suggestions"></div>
<div id="results"></div>

<!-- صندوق تجربة الكود متعدد اللغات -->
<div id="codeTester">
  <h3>تجربة الكود</h3>
  <label>اختر اللغة:</label>
  <select id="codeLang">
    <option value="js">JavaScript</option>
    <option value="py">Python</option>
  </select>
  <textarea id="testCode" placeholder="ضع كودك هنا"></textarea>
  <button id="runCode">تشغيل الكود</button>
  <button id="clearCode">مسح الكود</button>
  <pre id="output"></pre>
</div>

</div>

<!-- القاموس القديم -->
<script src="data.js"></script>
<script src="script.js"></script>

<!-- Pyodide لتشغيل Python -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

<script>
// تحميل Pyodide لتجربة Python
let pyodideReady = false;
let pyodide = null;
async function loadPyodideAndPackages() {
    pyodide = await loadPyodide();
    pyodideReady = true;
    console.log("✅ Pyodide جاهز لتشغيل Python");
}
loadPyodideAndPackages();

// تشغيل الكود متعدد اللغات
document.getElementById("runCode").addEventListener("click", async () => {
    const code = document.getElementById("testCode").value;
    const lang = document.getElementById("codeLang").value;
    const output = document.getElementById("output");
    output.innerText = "";

    if(lang === "js"){
        try {
            const result = eval(code);
            output.innerText = result === undefined ? "تم التنفيذ بدون قيمة إرجاع" : result;
        } catch(err){
            output.innerText = "خطأ: " + err;
        }
    } else if(lang === "py"){
        if(!pyodideReady){
            output.innerText = "⚠️ انتظر تحميل Python...";
            return;
        }
        try{
            output.innerText = "";
            pyodide.stdout = (msg) => { output.innerText += msg + "\n"; };
            pyodide.stderr = (msg) => { output.innerText += "خطأ: " + msg + "\n"; };
            await pyodide.runPythonAsync(code);
            if(output.innerText === "") output.innerText = "تم التنفيذ بدون قيمة إرجاع";
        } catch(err){
            output.innerText += "خطأ: " + err;
        }
    }
});

// مسح الكود والنتيجة
document.getElementById("clearCode").addEventListener("click", () => {
    document.getElementById("testCode").value = "";
    document.getElementById("output").innerText = "";
});
</script>

</body>
</html>
