<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>

<style>

/* التنسيق القديم محفوظ */
.term pre{
background:#f4f4f4;
border:1px solid #ccc;
padding:10px;
overflow-x:auto;
white-space:pre-wrap;
font-family:monospace;
}

.term button{
margin-top:5px;
padding:5px 10px;
cursor:pointer;
}

.search-box button{
margin-left:5px;
padding:5px 10px;
cursor:pointer;
}

/* إضافات جديدة بسيطة */

.filter-box{
margin-top:10px;
}

.filter-box button{
margin:3px;
padding:5px 10px;
cursor:pointer;
}

#termCounter{
margin-top:10px;
font-weight:bold;
color:#444;
}

/* صندوق تجربة الكود */

#codeTester{
border:1px solid #ccc;
padding:10px;
margin-top:20px;
}

#codeTester textarea{
width:100%;
height:150px;
margin-top:10px;
font-family:monospace;
}

#codeTester pre{
background:#f5f5f5;
padding:10px;
margin-top:10px;
white-space:pre-wrap;
border:1px solid #ccc;
}

#codeTester button{
margin-top:5px;
padding:5px 10px;
cursor:pointer;
}

</style>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Smart Code Dictionary</h1>

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="ابحث عن مصطلح..."
onkeyup="searchTerm();suggestWords();">

<button onclick="searchTerm()">بحث</button>
<button onclick="clearSearch()">مسح</button>
<button onclick="showAllTerms()">عرض جميع المصطلحات</button>

</div>

<!-- فلترة المجالات -->

<div class="filter-box">

<button onclick="filterField('Python')">Python</button>

<button onclick="filterField('JavaScript')">JavaScript</button>

<button onclick="filterField('Cyber Security')">Cyber Security</button>

<button onclick="filterField('Navigation')">Navigation</button>

<button onclick="showAllTerms()">عرض الكل</button>

</div>

<div id="termCounter"></div>

<div id="suggestions"></div>

<div id="results"></div>

<!-- صندوق تجربة الكود -->

<div id="codeTester">

<h3>تجربة الكود</h3>

<label>اختر اللغة:</label>

<select id="codeLang">

<option value="js">JavaScript</option>

<option value="py">Python</option>

</select>

<textarea id="testCode" placeholder="ضع كودك هنا"></textarea>

<button id="runCode">تشغيل الكود</button>

<button id="clearCode">مسح الكود</button>

<button id="copyCode">نسخ الكود</button>

<pre id="output"></pre>

</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

<script>

/* تحميل Python */

let pyodide=null;

async function loadPyodideAndPackages(){

document.getElementById("output").innerText="جاري تحميل Python...";

pyodide=await loadPyodide();

document.getElementById("output").innerText="Python جاهز للتجربة";

}

loadPyodideAndPackages();

/* تشغيل الكود */

document.getElementById("runCode").addEventListener("click",async()=>{

const code=document.getElementById("testCode").value;

const lang=document.getElementById("codeLang").value;

const output=document.getElementById("output");

output.innerText="";

if(lang==="js"){

try{

const result=eval(code);

if(result!==undefined){

output.innerText=result;

}else{

output.innerText="تم التنفيذ بنجاح";

}

}catch(err){

output.innerText="خطأ: "+err.message;

}

}

/* تشغيل Python */

if(lang==="py"){

if(!pyodide){

output.innerText="Python مازال يحمل...";

return;

}

try{

pyodide.runPython(`
import sys
from io import StringIO
sys.stdout=StringIO()
`);

await pyodide.runPythonAsync(code);

const result=pyodide.runPython("sys.stdout.getvalue()");

if(result.trim()===""){

output.innerText="تم التنفيذ بدون مخرجات";

}else{

output.innerText=result;

}

}catch(err){

output.innerText="خطأ: "+err;

}

}

});

/* مسح الكود */

document.getElementById("clearCode").addEventListener("click",()=>{

document.getElementById("testCode").value="";

document.getElementById("output").innerText="";

});

/* نسخ الكود */

document.getElementById("copyCode").addEventListener("click",()=>{

const code=document.getElementById("testCode");

code.select();

document.execCommand("copy");

alert("تم نسخ الكود");

});

</script>

</body>

</html>
