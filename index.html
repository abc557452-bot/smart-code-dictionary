<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<title>Smart Code Dictionary</title>

<!-- CSS لتنسيق القاموس والكود -->
<style>
/* تنسيق عرض المصطلحات */
.term pre {
    background-color: #f4f4f4;  
    border: 1px solid #ccc;      
    padding: 10px;                
    overflow-x: auto;             
    white-space: pre-wrap;        
    font-family: monospace;       
}
.term button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
.search-box button {
    margin-left: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

/* تنسيق صندوق تجربة الكود */
#codeTester {
    border: 1px solid #ccc;
    padding: 10px;
    margin-top: 20px;
}
#codeTester textarea {
    width: 100%;
    height: 150px;
    margin-top: 10px;
    font-family: monospace;
}
#codeTester pre {
    background: #f5f5f5;
    padding: 10px;
    margin-top: 10px;
    white-space: pre-wrap;
    border: 1px solid #ccc;
}
#codeTester button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Smart Code Dictionary</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن مصطلح..." onkeyup="searchTerm(); suggestWords();">
<button onclick="searchTerm()">بحث</button>
<button onclick="clearSearch()">مسح</button>
<button onclick="showAllTerms()">عرض جميع المصطلحات</button>
</div>

<div id="suggestions"></div>
<div id="results"></div>

<!-- ====== صندوق تجربة الكود الجديد ====== -->
<div id="codeTester">
  <h3>تجربة الكود</h3>
  <select id="termSelector">
    <option value="">اختر مصطلح لتجربة الكود</option>
  </select>
  <textarea id="testCode" placeholder="الكود سيظهر هنا"></textarea>
  <button id="runCode">تشغيل الكود</button>
  <button id="clearCode">مسح الكود</button>
  <pre id="output"></pre>
</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

<script>
// تعبئة قائمة المصطلحات التي تحتوي على كود
const selector = document.getElementById("termSelector");
for (let key in dictionary) {
    if (dictionary[key].example_code) {
        let option = document.createElement("option");
        option.value = key;
        option.text = dictionary[key].title;
        selector.appendChild(option);
    }
}

// عند اختيار مصطلح، عرض الكود في الصندوق
selector.addEventListener("change", () => {
    const key = selector.value;
    document.getElementById("testCode").value = key ? dictionary[key].example_code : "";
    document.getElementById("output").innerText = "";
});

// تشغيل الكود وتجربة النتيجة
document.getElementById("runCode").addEventListener("click", () => {
    const code = document.getElementById("testCode").value;
    const output = document.getElementById("output");
    try {
        let result = eval(code);
        output.innerText = result === undefined ? "تم التنفيذ بدون قيمة إرجاع" : result;
    } catch (err) {
        output.innerText = "خطأ: " + err;
    }
});

// مسح الكود والنتيجة
document.getElementById("clearCode").addEventListener("click", () => {
    document.getElementById("testCode").value = "";
    document.getElementById("output").innerText = "";
});
</script>

</body>
</html>
