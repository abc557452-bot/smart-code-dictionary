name: Build App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Web to APK
        uses: flywheel-io/web-to-apk@v1
        with:
          url: "https://github.io"
          name: "SmartCode"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./*.apk
