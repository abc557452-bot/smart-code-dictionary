name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # هذه الأداة ستقوم بتحويل الرابط لتطبيق أندرويد
          bubblewrap init --url "https://github.io" --manifest "https://github.iomanifest.json" --yes
          bubblewrap build --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Dictionary-APK
          path: ./*.apk
