

name: Build App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        uses: swantzter/render-to-apk@v1.1
        with:
          url: https://github.io
          app_name: "smart-code-dictionary"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: ./*.apk
