name: Build Real APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert Website to APK
        uses: cloudcannon/page-to-apk@v1.0.0
        with:
          url: "https://github.io"
          title: "Smart Code Dictionary"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Dictionary-APK
          path: ./*.apk
