name: Build App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simple Build
        run: |
          echo "Building APK..."
          # إنشاء ملف وهمي للتأكد أن الأكشن يعمل بنجاح
          touch smart-code.apk 

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-app-package
          path: smart-code.apk

