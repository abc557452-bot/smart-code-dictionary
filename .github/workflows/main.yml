name: Build Android App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK
        uses: gearace/pwa-to-apk@v1
        with:
          url: "https://github.io"
          name: "SmartDictionary"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: ./*.apk
