name: Build App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          # تحميل أداة تحويل الروابط لـ APK مباشرة
          wget https://github.com
          chmod +x pwa-to-apk

      - name: Generate APK
        run: |
          ./pwa-to-apk --url "https://github.io" --name "SmartDictionary"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Code-Dictionary-APK
          path: ./*.apk
